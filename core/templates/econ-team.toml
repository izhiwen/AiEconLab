schema_version = "1.0"

[team]
project_name = "<your-research-project>"
core_roles = [
  "advisor", "pi",
  "theorist", "pm",
  "ra-stata", "ra-python",
  "referee", "replicator",
]
active_experts = []
toolchain = ["python", "stata", "latex"]

[coordinator.light]
complexity_max = 2
fire_consultant = false

[coordinator.medium]
complexity_min = 3
complexity_max = 4
fire_consultant = true

[coordinator.heavy]
complexity_min = 5
risk_threshold = 0.7
fire_consultant = true

[owner_interface]
default_visible = ["advisor", "pi"]
allow_direct_talk_to_others = true

# Fuzzy role aliases for `aiplus agent talk` (substring match, case-insensitive).
# Matching: alias.contains(input) || input.contains(alias). Requires aiplus v0.6.20+.
# Source: merged from aiplus default ship + AEL bash detect_role_from_input mappings.
[role_aliases]
