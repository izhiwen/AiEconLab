name: AiPlus Drift Check

# Surfaces "AEL is N commits behind aiplus" without forcing an immediate
# vendor bump. Runs every Monday 09:00 UTC and on-demand via the Actions
# UI. Maintains a single issue (label: aiplus-drift) that gets upserted
# on every run and auto-closed when drift returns to 0.
#
# This is part of the AEL → aiplus sync automation pipeline. See
# docs/dev/aiplus-drift-workflow.md for the full design rationale.

"on":
  schedule:
    # Daily at 09:00 UTC (= ~17:00 China time). aiplus moves fast — when
    # we polled weekly, vendor drift was reliably >10 commits by Friday.
    # Daily cadence gives Owner a fresh signal before drift becomes
    # painful to triage.
    - cron: '0 9 * * *'
  workflow_dispatch:
  # Also fires when aiplus releases a tag — release-ael.yml in aiplus
  # ends with a `repository_dispatch` call (see future PR aiplus#...).
  repository_dispatch:
    types: [aiplus-released]

permissions:
  contents: read
  issues: write

jobs:
  drift:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout AEL with submodules
        uses: actions/checkout@v5
        with:
          submodules: recursive
          fetch-depth: 1

      - name: Fetch latest aiplus
        working-directory: vendor/aiplus
        run: |
          set -euo pipefail
          git fetch --no-tags --depth=200 origin main

      - name: Compute drift
        id: drift
        working-directory: vendor/aiplus
        run: |
          set -euo pipefail
          pin="$(git rev-parse HEAD)"
          head="$(git rev-parse origin/main)"
          raw_count="$(git rev-list --count HEAD..origin/main)"

          # Ignore-list: commits whose subject matches these regexes are
          # treated as "no user-impact noise" — CI/release-pipeline/docs
          # changes that don't change AEL behavior. They still get listed
          # in the issue body for audit but they don't fire the "drift
          # alarm" count, so Owner isn't pestered by upstream housekeeping.
          ignore_re='^(ci|docs|chore\(release\)|chore\(vendor\)|chore\(deps\)|chore\(assets\)|chore\(agent-team\))[(:]'

          if [ "$raw_count" -gt 0 ]; then
            git log --oneline --no-decorate HEAD..origin/main > /tmp/drift-all.txt
            grep -Ev "  $ignore_re" /tmp/drift-all.txt > /tmp/drift-commits.txt || true
            grep -E  "  $ignore_re" /tmp/drift-all.txt > /tmp/drift-ignored.txt || true
            # The grep regex above only matches the subject (after the SHA
            # + space). `git log --oneline` format is `<sha> <subject>`,
            # so we anchor on two spaces — no wait, oneline uses one
            # space. Switch to a saner approach: cut the subject.
            : > /tmp/drift-commits.txt
            : > /tmp/drift-ignored.txt
            while IFS= read -r line; do
              subject="${line#* }"  # strip leading SHA + space
              if printf '%s' "$subject" | grep -Eq "$ignore_re"; then
                printf '%s\n' "$line" >> /tmp/drift-ignored.txt
              else
                printf '%s\n' "$line" >> /tmp/drift-commits.txt
              fi
            done < /tmp/drift-all.txt
          else
            : > /tmp/drift-all.txt
            : > /tmp/drift-commits.txt
            : > /tmp/drift-ignored.txt
          fi

          count="$(wc -l < /tmp/drift-commits.txt | tr -d ' ')"
          ignored_count="$(wc -l < /tmp/drift-ignored.txt | tr -d ' ')"

          {
            echo "pin=$pin"
            echo "head=$head"
            echo "count=$count"
            echo "raw_count=$raw_count"
            echo "ignored_count=$ignored_count"
          } >> "$GITHUB_OUTPUT"

      - name: Build drift issue body
        if: steps.drift.outputs.count != '0'
        run: |
          set -euo pipefail
          {
            echo "## AEL ↔ aiplus drift — $(date -u +%Y-%m-%dT%H:%MZ)"
            echo
            echo "AEL's \`vendor/aiplus\` submodule is **${{ steps.drift.outputs.count }} user-relevant commits behind** aiplus \`origin/main\` (plus ${{ steps.drift.outputs.ignored_count }} ignored ci/docs/release-prep commits)."
            echo
            echo "| | commit |"
            echo "|---|---|"
            echo "| AEL vendor pin | \`${{ steps.drift.outputs.pin }}\` |"
            echo "| aiplus origin/main | \`${{ steps.drift.outputs.head }}\` |"
            echo
            echo "### User-relevant commits AEL has not vendored yet"
            echo
            echo '```'
            cat /tmp/drift-commits.txt
            echo '```'
            if [ -s /tmp/drift-ignored.txt ]; then
              echo
              echo "### Ignored (CI / docs / release-prep)"
              echo
              echo "These commits do not change AEL behavior. Listed for audit only — they do not contribute to the drift count."
              echo
              echo '```'
              cat /tmp/drift-ignored.txt
              echo '```'
            fi
            echo
            echo "### Suggested next steps"
            echo
            echo "If any of those commits are user-relevant or carry a release tag, open a vendor bump PR:"
            echo
            echo '```bash'
            echo "git checkout -b chore/bump-vendor-aiplus-\$(date +%Y%m%d)"
            echo "git -C vendor/aiplus checkout ${{ steps.drift.outputs.head }}"
            echo "git add vendor/aiplus && git commit -m 'chore(vendor): bump aiplus to <subject>'"
            echo "git push -u origin HEAD && gh pr create"
            echo '```'
            echo
            echo "After CI passes and merge, cut the next AEL release."
            echo
            echo "---"
            echo "*Auto-generated by [.github/workflows/aiplus-drift-check.yml](../blob/main/.github/workflows/aiplus-drift-check.yml). This issue is upserted weekly and auto-closes when drift returns to 0.*"
          } > /tmp/drift-body.md

      - name: Upsert drift issue
        if: steps.drift.outputs.count != '0'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          # Ensure the label exists (idempotent).
          gh label create aiplus-drift \
            --description 'AEL vendor pin is behind aiplus origin/main' \
            --color FFA500 \
            --force >/dev/null 2>&1 || true

          existing="$(
            gh issue list --label aiplus-drift --state open \
              --json number --jq '.[0].number // empty'
          )"
          title="[drift] aiplus has ${{ steps.drift.outputs.count }} commits ahead of AEL vendor pin"

          if [ -n "$existing" ]; then
            gh issue edit "$existing" --title "$title" --body-file /tmp/drift-body.md
            echo "Updated existing drift issue #$existing"
          else
            url="$(gh issue create \
              --title "$title" \
              --label aiplus-drift \
              --body-file /tmp/drift-body.md)"
            echo "Created new drift issue: $url"
          fi

      - name: Close drift issue (drift returned to 0)
        if: steps.drift.outputs.count == '0'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          for n in $(gh issue list --label aiplus-drift --state open \
                       --json number --jq '.[].number'); do
            gh issue comment "$n" \
              --body "Drift dropped to 0 as of $(date -u +%Y-%m-%dT%H:%MZ). Closing automatically."
            gh issue close "$n"
            echo "Closed drift issue #$n"
          done

      - name: Summary
        run: |
          echo "### Drift check summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- Vendor pin: \`${{ steps.drift.outputs.pin }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- aiplus origin/main: \`${{ steps.drift.outputs.head }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Commits behind: ${{ steps.drift.outputs.count }}" >> "$GITHUB_STEP_SUMMARY"
