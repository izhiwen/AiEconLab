name: debug secret sha (temporary)
on:
  workflow_dispatch: {}

jobs:
  sha:
    runs-on: ubuntu-latest
    steps:
      - name: print non-revealing fingerprint
        env:
          A: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          # Non-revealing fingerprint: length + 12-char SHA-256 prefix
          # + 'first 7' (public `sk-ant-` prefix only). Lets us verify
          # the value GitHub received matches what we pushed, without
          # exposing the key.
          printf 'len=%s ' "${#A}"
          printf 'sha12='
          printf '%s' "$A" | sha256sum | cut -c1-12
          printf 'first7=%s\n' "${A:0:7}"
