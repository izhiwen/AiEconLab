name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  validate-assets:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate JSON files
        run: |
          set -euo pipefail
          find . -name "*.json" -not -path "./.git/*" -print0 | while IFS= read -r -d '' f; do
            jq empty "$f" || { echo "::error file=$f::invalid JSON"; exit 1; }
          done
      - name: Validate YAML files
        run: |
          set -euo pipefail
          pip install --quiet yamllint
          find . \( -name "*.yaml" -o -name "*.yml" \) -not -path "./.git/*" -not -path "./.aiplus/*" | while read -r f; do
            yamllint -d "{extends: default, rules: {line-length: disable, document-start: disable}}" "$f"
          done
          # .aiplus/ contains internal data files, excluded from yamllint
      - name: Validate TOML files
        run: |
          set -euo pipefail
          pip install --quiet tomli
          find . -name "*.toml" -not -path "./.git/*" -print0 | while IFS= read -r -d '' f; do
            python3 -c "import tomli; tomli.loads(open('$f').read())" || exit 1
          done
      - name: Run acceptance test
        run: |
          set -euo pipefail
          if [ -x tests/acceptance.test.sh ]; then
            bash tests/acceptance.test.sh
          fi
      - name: Run other .test.sh fixtures
        run: |
          if [ -d tests ]; then
            find tests -name "*.test.sh" -not -name "acceptance.test.sh" -executable -print0 | while IFS= read -r -d '' f; do
              echo "Running $f"
              bash "$f" || exit 1
            done
          fi

  regression-15-install-no-delete:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: dtolnay/rust-toolchain@stable
      - name: Install Linux build deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends libdbus-1-dev pkg-config
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: vendor/aiplus
          key: regression-15-aiplus
      - name: Build aiplus from vendored source
        # aiplus upstream narrowed pre-built binary support to Apple Silicon
        # Mac + Windows (their install.sh now refuses Linux x86_64). We can't
        # `curl install.sh | bash` aiplus on the ubuntu runner anymore.
        # Build aiplus from the vendored submodule instead — matches the
        # pattern in install-smoke.yml.
        run: |
          set -euo pipefail
          cd vendor/aiplus
          cargo build --release --bin aiplus
          mkdir -p "$HOME/.local/bin"
          cp target/release/aiplus "$HOME/.local/bin/aiplus"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          "$HOME/.local/bin/aiplus" --version
      - name: "Run #15 dogfood install safety regression"
        run: bash tests/regression_15_install_no_delete.sh
